<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progetti Green del Giorno</title>
    
    <!-- Carica la libreria Supabase obbligatoria -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- STILE CSS DEL SITO -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7f4;
            color: #2d3748;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-top: 40px;
        }
        header h1 {
            color: #1b5e20;
            margin-bottom: 5px;
        }
        header p {
            color: #666;
            font-size: 1rem;
        }
        .card {
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(46, 125, 50, 0.08);
            max-width: 500px;
            width: 100%;
            margin-top: 40px;
            border-top: 6px solid #2e7d32;
            box-sizing: border-box;
        }
        .tag {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
        }
        h2 {
            color: #1b5e20;
            margin: 0 0 15px 0;
            font-size: 1.6rem;
        }
        p {
            line-height: 1.6;
            color: #4a5568;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #2e7d32;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <header>
        <h1>Iniziative Ecologiche dall'AI</h1>
        <p>Ogni giorno un nuovo progetto per salvare il pianeta, scovato dalla nostra IA.</p>
    </header>

    <main>
        <div id="project-card" class="card">
            <span id="project-tag" class="tag">Analisi in corso...</span>
            <h2 id="project-title">Cercando un progetto green...</h2>
            <p id="project-description">L'intelligenza artificiale sta leggendo il web per trovare l'iniziativa di oggi.</p>
            <a id="project-link" href="#" target="_blank" class="btn" style="display: none;">Scopri di più ed esplora</a>
        </div>
    </main>

    <!-- LOGICA JAVASCRIPT -->
    <script>
        // URL base del progetto Supabase (senza /rest/v1/ alla fine)
        const SUPABASE_URL = "https://worswtmpuzslmppbnuic.supabase.co";
        const SUPABASE_KEY = "sb_publishable_AJBGxaZRZKy2cy2FYrfdyA_D9g82Lxl";

        // Connessione a Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function caricaProgettoGreen() {
            try {
                // Legge l'ultima riga inserita nel database
                const { data, error } = await supabaseClient
                    .from('notizie')
                    .select('titolo, categoria, descrizione, link')
                    .order('id', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    const progetto = data[0];
                    
                    // Aggiorna i testi nella pagina
                    document.getElementById('project-tag').innerText = progetto.categoria;
                    document.getElementById('project-title').innerText = progetto.titolo;
                    document.getElementById('project-description').innerText = progetto.descrizione;
                    
                    // Gestisce il link esterno — FIX: era "proyecto.link" (spagnolo)
                    const linkBtn = document.getElementById('project-link');
                    if (progetto.link && progetto.link !== "") {
                        linkBtn.href = progetto.link;
                        linkBtn.style.display = "block";
                    }
                } else {
                    document.getElementById('project-title').innerText = "Nessun progetto in archivio.";
                }

            } catch (error) {
                console.error("Errore:", error);
                document.getElementById('project-title').innerText = "Errore di connessione al database.";
            }
        }

        // Avvia il caricamento quando la pagina si apre
        window.onload = caricaProgettoGreen;
    </script>
</body>
</html>
