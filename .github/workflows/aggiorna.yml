name: Aggiornamento Quotidiano Sito Green

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
    - name: Prendi il codice della repository
      uses: actions/checkout@v4

    - name: Configura Python sul server
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa i pacchetti necessari
      run: pip install supabase langchain-core langchain-community langchain-groq

    - name: Esegui lo script AI
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python cervello_ai.py
